<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — TEAM 3332</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080B12; --dark: #0F1420; --card: #131B2E; --border: #1E2D45;
      --border2: #253650; --blue: #0EA5E9; --blue-light: #38BDF8;
      --green: #10B981; --gold: #F59E0B; --white: #F0F4FF; --gray: #8A9BB5; --red: #EF4444;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Barlow', sans-serif; background: var(--black); color: var(--white);
      line-height: 1.5; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(14,165,233,0.14) 0%, transparent 70%), var(--black);
    }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      padding: 48px 40px; width: 100%; max-width: 440px;
    }
    .logo {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 2rem;
      text-align: center; margin-bottom: 6px;
    }
    .logo span { color: var(--blue); }
    .tagline { text-align: center; color: var(--gray); font-size: 0.85rem; margin-bottom: 32px; }
    h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; text-align: center; }
    .sub { text-align: center; color: var(--gray); font-size: 0.9rem; margin-bottom: 28px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--gray); margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
    .form-group { margin-bottom: 16px; }
    input[type=password] {
      width: 100%; background: var(--dark); border: 1px solid var(--border); border-radius: 8px;
      padding: 11px 14px; color: var(--white); font-family: 'Barlow', sans-serif;
      font-size: 0.92rem; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--blue); }
    input::placeholder { color: var(--gray); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px 24px; border-radius: 8px; font-family: 'Barlow', sans-serif;
      font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
      border: none; letter-spacing: 0.02em; text-decoration: none; margin-top: 8px;
    }
    .btn-primary { background: var(--blue); color: var(--white); }
    .btn-primary:hover { background: var(--blue-light); box-shadow: 0 4px 16px rgba(14,165,233,0.35); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }
    .msg { font-size: 0.85rem; padding: 10px 12px; border-radius: 8px; margin-bottom: 16px; }
    .msg-error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.35); color: #FCA5A5; }
    .msg-ok { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.35); color: #6EE7B7; }
    .hint { font-size: 0.78rem; color: var(--gray); margin-top: -8px; margin-bottom: 16px; }
    .center { text-align: center; }
    .link { color: var(--blue-light); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    .link:hover { text-decoration: underline; }
    .success-icon { font-size: 3rem; text-align: center; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">TEAM <span>3332</span></div>
    <div class="tagline">Reset your password</div>
    <div id="content"><!-- rendered by JS --></div>
  </div>

  <script>
    // Same-origin API — works whether served from railway.app or team3332.com
    const API_BASE = '/api';
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const content = document.getElementById('content');
    const APP_URL = '/app';

    function noToken() {
      content.innerHTML = `
        <div class="msg msg-error">This reset link is missing its token or is malformed. Please request a new password reset link.</div>
        <a class="btn btn-primary" href="${APP_URL}">Back to sign in</a>`;
    }

    function showForm() {
      content.innerHTML = `
        <h1>Set a new password</h1>
        <p class="sub">Choose a strong password you don't use elsewhere.</p>
        <div id="alert"></div>
        <form id="form">
          <div class="form-group">
            <label for="pw">New password</label>
            <input type="password" id="pw" placeholder="At least 6 characters" autocomplete="new-password" required />
          </div>
          <div class="form-group">
            <label for="pw2">Confirm new password</label>
            <input type="password" id="pw2" placeholder="Re-enter your password" autocomplete="new-password" required />
          </div>
          <button class="btn btn-primary" id="submit" type="submit">Reset password</button>
        </form>`;

      const form = document.getElementById('form');
      const alertBox = document.getElementById('alert');
      const btn = document.getElementById('submit');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        alertBox.innerHTML = '';
        const pw = document.getElementById('pw').value;
        const pw2 = document.getElementById('pw2').value;

        if (pw.length < 6) {
          alertBox.innerHTML = `<div class="msg msg-error">Password must be at least 6 characters.</div>`;
          return;
        }
        if (pw !== pw2) {
          alertBox.innerHTML = `<div class="msg msg-error">Passwords don't match.</div>`;
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting…';
        try {
          const res = await fetch(`${API_BASE}/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, new_password: pw }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            alertBox.innerHTML = `<div class="msg msg-error">${data.error || 'Something went wrong. Please request a new reset link.'}</div>`;
            btn.disabled = false;
            btn.textContent = 'Reset password';
            return;
          }
          showSuccess();
        } catch (err) {
          alertBox.innerHTML = `<div class="msg msg-error">Network error. Please try again.</div>`;
          btn.disabled = false;
          btn.textContent = 'Reset password';
        }
      });
    }

    function showSuccess() {
      content.innerHTML = `
        <div class="success-icon">✅</div>
        <h1>Password reset</h1>
        <p class="sub">Your password has been updated. You can now sign in with your new password.</p>
        <a class="btn btn-primary" href="${APP_URL}">Sign in</a>`;
    }

    // Boot
    if (!token) noToken(); else showForm();
  </script>
</body>
</html>
