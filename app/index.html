<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEAM 3332 App</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Phase 2a (June 2026): React, ReactDOM and Leaflet are BUNDLED into app.js (esbuild
       bundle:true). They are no longer loaded from a CDN — the rendering stack boots with
       zero CDN dependency and works offline. (Removed: unpkg react/react-dom/leaflet
       <script> tags and the leaflet.css CDN <link>.) There is no in-browser Babel either —
       Babel-standalone was removed June 2026; it caused the Babel-8 black-screen outage and
       the slow cold-boot transpile. Leaflet's stylesheet is now the local leaflet.css,
       copied next to app.js by npm run build:app. -->
  <link rel="stylesheet" href="leaflet.css" />
  <!-- Native-only: load the Capacitor core runtime so window.Capacitor.registerPlugin
       exists in the WKWebView. This no-build app never bundles @capacitor/core, so the
       native bridge injects window.Capacitor (isNativePlatform works) but NOT
       registerPlugin — which left GeoTracker falling back to navigator.geolocation and
       killed background/locked-screen tracking (see handoff617d). sync-www.mjs copies
       capacitor.js into www/ from node_modules. Gated to native + written synchronously
       (document.write during head parse) so registerPlugin is ready before the app
       script runs. On the web (team3332.com) Capacitor is absent, so this never fires
       and there is zero web impact. (618 — background GPS) -->
  <script>
    (function(){
      try {
        var C = window.Capacitor;
        if (C && typeof C.isNativePlatform === 'function' && C.isNativePlatform()
            && typeof C.registerPlugin !== 'function') {
          document.write('<script src="capacitor.js"><\/script>');
        }
      } catch (e) { /* never block boot on the runtime loader */ }
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080B12;
      --dark: #0F1420;
      --card: #131B2E;
      --card2: #192038;
      --border: #1E2D45;
      --border2: #253650;
      --blue: #D4AF37;
      --blue-light: #E6C75C;
      --blue-glow: rgba(212,175,55,0.15);
      --green: #6B5B95;
      --green-glow: rgba(107,91,149,0.15);
      --gold: #F59E0B;
      --gold-glow: rgba(245,158,11,0.15);
      --purple: #8B5CF6;
      --white: #F0F4FF;
      --gray: #8A9BB5;
      --light: #C4CFDF;
    }

    html, body, #root { height: 100%; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--black);
      color: var(--white);
      line-height: 1.5;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* ── LIVE ROUTE MAP (recorder) ── */
    .live-map { position: absolute; inset: 0; background: var(--dark); z-index: 0; }
    .live-map .leaflet-container { width: 100%; height: 100%; background: var(--dark); font-family: 'Barlow', sans-serif; }
    /* Mute OSM tiles so the gold route + overlaid stats stay readable.
       Mapbox dark styles are already dark, so only OSM gets the filter. */
    .tiles-osm .leaflet-tile { filter: grayscale(0.55) brightness(0.62) contrast(1.05); }
    .live-map .leaflet-control-attribution {
      background: rgba(11,15,20,0.6); color: var(--gray); font-size: 9px; }
    .live-map .leaflet-control-attribution a { color: var(--light); }
    .live-map-scrim { position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(180deg, rgba(8,11,18,0.55) 0%, rgba(8,11,18,0.05) 28%, rgba(8,11,18,0.20) 60%, rgba(8,11,18,0.92) 100%); }
    .live-map-wait { position: absolute; inset: 0; z-index: 2; display: flex; align-items: center;
      justify-content: center; color: var(--gray); font-size: 0.85rem; text-align: center; padding: 24px; }
    .route-mini { height: 200px; border-radius: 16px; overflow: hidden; border: 1px solid var(--border);
      margin-bottom: 20px; background: var(--dark); }
    .route-mini .leaflet-container { width: 100%; height: 100%; background: var(--dark); }
    .route-mini .leaflet-control-attribution { background: rgba(11,15,20,0.6); color: var(--gray); font-size: 9px; }
    .route-mini .leaflet-control-attribution a { color: var(--light); }

    /* ── AUTH ── */
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(255,87,34,0.14) 0%, transparent 70%),
        var(--black);
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
    }

    .auth-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      text-align: center;
      margin-bottom: 8px;
    }

    .auth-logo span { color: var(--blue); }
    .auth-tagline { text-align: center; color: var(--gray); font-size: 0.85rem; margin-bottom: 36px; }

    .auth-tabs {
      display: flex;
      background: var(--dark);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 0.88rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      color: var(--gray);
      transition: all 0.2s;
      border: none;
      background: transparent;
    }

    .auth-tab.active { background: var(--card); color: var(--white); }

    .form-group { margin-bottom: 16px; }

    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--gray); margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }

    input[type=text], input[type=email], input[type=password], input[type=number], select, textarea {
      width: 100%;
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus { border-color: var(--blue); }
    input::placeholder, textarea::placeholder { color: var(--gray); }

    select { cursor: pointer; }
    select option { background: var(--dark); }

    textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 8px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      letter-spacing: 0.02em;
      text-decoration: none;
    }

    .btn-full { width: 100%; }

    .btn-primary { background: var(--blue); color: var(--white); }
    .btn-primary:hover { background: var(--blue-light); box-shadow: 0 4px 16px rgba(212,175,55,0.35); }

    .btn-secondary { background: var(--dark); color: var(--white); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--gray); }

    .btn-ghost { background: transparent; color: var(--gray); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--white); border-color: var(--border2); }

    .btn-sm { padding: 7px 14px; font-size: 0.8rem; }
    .btn-xs { padding: 5px 10px; font-size: 0.75rem; border-radius: 6px; }

    .btn-green { background: var(--green); color: var(--white); }
    .btn-green:hover { background: #43a047; }

    /* ── APP SHELL ── */
    .app-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--dark);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      overflow-y: auto;
    }

    .sidebar-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .sidebar-logo span { color: var(--blue); }

    .sidebar-section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray);
      padding: 8px 20px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--gray);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 0;
      transition: all 0.15s;
      border-left: 3px solid transparent;
      margin: 1px 0;
      text-decoration: none;
    }

    .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }

    .nav-item.active {
      color: var(--white);
      background: rgba(212,175,55,0.1);
      border-left-color: var(--blue);
    }

    .nav-icon { font-size: 1rem; width: 20px; text-align: center; }

    .sidebar-bottom {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    .sidebar-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .avatar-lg {
      width: 72px; height: 72px;
      font-size: 1.6rem;
    }

    .sidebar-user-info { flex: 1; min-width: 0; }
    .sidebar-user-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-user-tier { font-size: 0.72rem; color: var(--blue); font-weight: 600; }

    /* ── MAIN ── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      background: var(--black);
    }

    .page-header {
      padding: 28px 32px 0;
      border-bottom: 1px solid var(--border);
      background: var(--black);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .page-header-inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-bottom: 20px;
    }

    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .page-sub { color: var(--gray); font-size: 0.85rem; margin-top: 2px; }

    .page-body { padding: 28px 32px; }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

    /* ── STAT CARDS ── */
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      line-height: 1;
    }

    .stat-change {
      font-size: 0.78rem;
      color: var(--green);
      margin-top: 4px;
    }

    /* ── BADGE ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge-orange { background: var(--blue-glow); color: var(--blue); border: 1px solid rgba(212,175,55,0.25); }
    .badge-green { background: rgba(76,175,80,0.15); color: var(--green); border: 1px solid rgba(76,175,80,0.25); }
    .badge-blue { background: rgba(33,150,243,0.15); color: var(--blue); border: 1px solid rgba(33,150,243,0.25); }
    .badge-purple { background: rgba(156,39,176,0.15); color: var(--purple); border: 1px solid rgba(156,39,176,0.25); }
    .badge-gray { background: rgba(138,144,158,0.15); color: var(--gray); border: 1px solid rgba(138,144,158,0.25); }

    /* ── PROGRESS BAR ── */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 100px;
      transition: width 0.6s ease;
    }

    .progress-fill.green { background: var(--green); }
    .progress-fill.blue { background: var(--blue); }

    /* ── ACTIVITY FEED ── */
    .activity-item {
      display: flex;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .activity-item:last-child { border-bottom: none; }

    .activity-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--dark);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .activity-title { font-size: 0.88rem; font-weight: 600; margin-bottom: 2px; }
    .activity-meta { font-size: 0.78rem; color: var(--gray); }

    .activity-stats {
      margin-left: auto;
      text-align: right;
      flex-shrink: 0;
    }

    .activity-stat-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; }
    .activity-stat-label { font-size: 0.7rem; color: var(--gray); }

    /* ── LEADERBOARD ── */
    .lb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .lb-row:last-child { border-bottom: none; }

    .lb-rank {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      width: 28px;
      text-align: center;
      color: var(--gray);
      flex-shrink: 0;
    }

    .lb-rank.gold { color: var(--gold); }
    .lb-rank.silver { color: #C0C0C0; }
    .lb-rank.bronze { color: #CD7F32; }

    .lb-name { flex: 1; font-size: 0.88rem; font-weight: 600; }
    .lb-sub { font-size: 0.75rem; color: var(--gray); }
    .lb-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; color: var(--blue); }

    .lb-you { background: rgba(212,175,55,0.06); border-radius: 8px; padding: 12px 8px; margin: 0 -8px; }

    /* ── CHALLENGE CARDS ── */
    .challenge-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .challenge-card:hover { border-color: var(--border2); }

    .challenge-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .challenge-icon { font-size: 1.5rem; }
    .challenge-title { font-weight: 700; font-size: 0.92rem; margin-bottom: 4px; }
    .challenge-desc { font-size: 0.8rem; color: var(--gray); line-height: 1.5; }

    .challenge-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
    }

    .challenge-meta { font-size: 0.75rem; color: var(--gray); }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--dark);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: var(--gray);
      font-family: 'Barlow', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active { background: var(--card); color: var(--white); }

    /* ── MAP PLACEHOLDER ── */
    .map-placeholder {
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 12px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: var(--gray);
      font-size: 0.85rem;
      position: relative;
      overflow: hidden;
    }

    .map-route {
      position: absolute;
      inset: 0;
    }

    /* ── CAPTAIN PANEL ── */
    .captain-header {
      background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(255,87,34,0.05));
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 16px;
      padding: 28px;
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 24px;
    }

    .captain-badge-big {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--blue), var(--blue-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
      box-shadow: 0 0 30px rgba(212,175,55,0.3);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--card2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 0.88rem;
      font-weight: 600;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ── MOBILE NAV ── */
    .mobile-header {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--dark);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .mobile-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.3rem;
    }

    .mobile-logo span { color: var(--blue); }

    .hamburger {
      background: none;
      border: none;
      color: var(--white);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 4px;
    }

    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--dark);
      border-top: 1px solid var(--border);
      z-index: 100;
      padding: 8px 0 env(safe-area-inset-bottom, 8px);
    }

    .bottom-nav-inner {
      display: flex;
      justify-content: space-around;
    }

    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 12px;
      cursor: pointer;
      color: var(--gray);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: none;
      background: none;
      flex: 1;
      transition: color 0.15s;
    }

    .bottom-nav-item .bnav-icon { font-size: 1.2rem; }
    .bottom-nav-item.active { color: var(--blue); }

    /* Raised center Record button */
    .bottom-nav-item.bnav-record {
      flex: 0 0 auto;
      justify-content: flex-end;
      padding: 6px 14px;
      color: var(--blue);
    }
    .bnav-record-circle {
      width: 54px; height: 54px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-light), var(--blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.35rem; color: var(--black);
      box-shadow: 0 6px 16px rgba(212,175,55,0.5);
      border: 3px solid var(--dark);
      margin-top: -26px;
      margin-bottom: 2px;
      transition: transform 0.12s;
    }
    .bottom-nav-item.bnav-record:active .bnav-record-circle { transform: scale(0.93); }

    .bnav-svg { width: 23px; height: 23px; display: block; }
    .bnav-record-circle .bnav-svg { width: 22px; height: 22px; margin-left: 2px; }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 150;
    }

    .sidebar-overlay.open { display: block; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .mobile-header { display: flex; }
      .bottom-nav { display: block; }

      .app-shell { flex-direction: column; }

      .sidebar {
        position: fixed;
        left: -260px;
        top: 0;
        bottom: 0;
        width: 240px;
        z-index: 200;
        transition: left 0.25s ease;
        padding-top: 16px;
      }

<style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>
<div id="root">

    <div style="width:28px;height:28px;border:3px solid #1E2D45;border-top-color:#D4AF37;border-radius:50%;animation:bootspin 0.8s linear infinite"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
/* Boot watchdog — plain JS so it runs even if React or app.js fail to load.
   If the app hasn't mounted (boot-status placeholder still present) 8s after
   load, show a friendly message + Reload instead of a silent black screen. */
(function(){
  function showError(msg){
    var r=document.getElementById('root');
    if(!r)return;
    r.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;font-family:Barlow,system-ui,sans-serif;background:#080B12;color:#F0F4FF"><div style="max-width:340px"><div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:2rem;letter-spacing:1px;margin-bottom:14px">TEAM <span style="color:#D4AF37">3332</span></div><div style="font-size:0.95rem;line-height:1.55;color:#8A9BB5;margin-bottom:22px">'+msg+'</div><button onclick="location.reload()" style="background:#D4AF37;color:#080B12;border:none;border-radius:10px;padding:12px 26px;font-weight:700;font-size:0.95rem;cursor:pointer">Reload</button></div></div>';
  }
  window.addEventListener('load',function(){
    setTimeout(function(){
      if(!document.getElementById('boot-status'))return; /* app mounted — nothing to do */
      /* React/ReactDOM are bundled inside app.js now (Phase 2a) — they are no longer
         window globals, so we can't probe window.React. If the app hasn't mounted, the
         usual cause is a failed app.js fetch, most often offline. */
      var offline=(typeof navigator!=='undefined'&&navigator.onLine===false);
      showError(offline
        ? 'We couldn’t load the app — please check your internet connection and reload.'
        : 'The app didn’t load correctly. Please reload; if it keeps happening, try again shortly.');
    },8000);
  });
})();
</script>
